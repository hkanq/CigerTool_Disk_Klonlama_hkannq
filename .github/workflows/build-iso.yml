name: Build CigerTool ISO

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-iso.yml"
      - "cigertool/**"
      - "docs/**"
      - "iso/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "README.md"
      - "scripts/build_iso.sh"

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            debootstrap \
            dosfstools \
            grub-common \
            grub-efi-amd64-bin \
            grub-pc-bin \
            isolinux \
            live-build \
            mtools \
            python3 \
            python3-pip \
            rsync \
            squashfs-tools \
            syslinux-common \
            syslinux-utils \
            xorriso

      - name: Make scripts executable
        run: |
          chmod +x scripts/build_iso.sh
          chmod +x iso/live-build/auto/config
          chmod +x iso/live-build/config/hooks/live/0100-install-cigertool.hook.chroot
          chmod +x iso/live-build/config/hooks/live/9999-fix-sources.hook.chroot

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p "test_*.py"

      - name: Build ISO
        run: sudo ./scripts/build_iso.sh

      - name: Verify boot autostart files
        run: |
          test -x iso/live-build/chroot/usr/local/bin/cigertool-launch
          test -L iso/live-build/chroot/etc/systemd/system/multi-user.target.wants/cigertool.service
          test "$(readlink iso/live-build/chroot/etc/systemd/system/multi-user.target.wants/cigertool.service)" = "/etc/systemd/system/cigertool.service"
          test -L iso/live-build/chroot/etc/systemd/system/getty@tty1.service
          test "$(readlink iso/live-build/chroot/etc/systemd/system/getty@tty1.service)" = "/dev/null"
          grep -q "systemd.mask=getty@tty1.service" iso/live-build/auto/config

      - name: Normalize artifact ownership
        run: sudo chown -R "$(id -u):$(id -g)" dist

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: cigertool.iso
          path: |
            dist/cigertool.iso
            dist/cigertool.iso.sha256
            dist/build.log
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cigertool.iso
            dist/cigertool.iso.sha256
