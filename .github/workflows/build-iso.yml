name: Build CigerTool WinPE ISO

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-winpe-iso:
    runs-on: windows-latest
    timeout-minutes: 150
    env:
      MSYSTEM: MSYS
      CHERE_INVOKING: 1
      MSYS2_PATH_TYPE: inherit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup MSYS2 (GRUB toolchain)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true

      - name: Discover MSYS2 packages
        shell: msys2 {0}
        run: |
          echo "ENV: $MSYSTEM"
          pacman -Ss xorriso || true
          pacman -Ss mtools || true
          pacman -Ss dosfstools || true

      - name: Install xorriso from MSYS
        shell: msys2 {0}
        run: |
          pacman --noconfirm -S --needed xorriso

      - name: Install mtools from MINGW64
        shell: msys2 {0}
        env:
          MSYSTEM: MINGW64
        run: |
          echo "ENV: $MSYSTEM"
          pacman --noconfirm -S --needed mingw-w64-x86_64-mtools

      - name: Expose MSYS2 toolchain on PATH
        shell: powershell
        run: |
          "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Log environment
        shell: powershell
        run: |
          $PSVersionTable
          python --version
          Write-Host "MSYSTEM=$env:MSYSTEM"
          $dism = Get-Command dism.exe -ErrorAction Stop
          Write-Host "DISM path=$($dism.Source)"
          Write-Host "Host OS=$([System.Environment]::OSVersion.VersionString)"

      - name: Debug MSYS2 toolchain
        shell: msys2 {0}
        run: |
          echo "MSYSTEM=$MSYSTEM"
          export PATH=/usr/bin:/mingw64/bin:$PATH
          which xorriso || true
          xorriso --version || true
          which mcopy || true
          which mformat || true

      - name: Verify ISO toolchain
        shell: powershell
        run: |
          if (-not (Test-Path "C:\msys64\usr\bin\xorriso.exe")) {
            throw "xorriso.exe bulunamadi."
          }
          if (-not (Test-Path "C:\msys64\mingw64\bin\mformat.exe")) {
            throw "mformat.exe bulunamadi."
          }
          if (-not (Test-Path "C:\msys64\mingw64\bin\mcopy.exe")) {
            throw "mcopy.exe bulunamadi."
          }
          if (-not (Test-Path "C:\msys64\mingw64\bin\mmd.exe")) {
            throw "mmd.exe bulunamadi."
          }

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        shell: powershell
        run: |
          python -m unittest discover -s tests -p "test_*.py"

      - name: Install ADK and WinPE Add-on
        shell: powershell
        run: |
          .\build\scripts\install_adk.ps1

      - name: Build desktop application
        shell: powershell
        run: |
          .\build\scripts\build_app.ps1

      - name: Build WinPE ISO
        shell: powershell
        run: |
          .\build\scripts\build_winpe_iso.ps1 -OutputIso "artifacts\CigerTool-by-hkannq.iso" -RequirePrebootMenu

      - name: Validate ISO artifact
        shell: powershell
        run: |
          if (-not (Test-Path "artifacts\CigerTool-by-hkannq.iso")) {
            throw "ISO artifact olusmadi."
          }
          Get-Item "artifacts\CigerTool-by-hkannq.iso" | Format-List Name,Length,LastWriteTime

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: CigerTool-by-hkannq.iso
          path: |
            artifacts/CigerTool-by-hkannq.iso
            artifacts/CigerTool-by-hkannq.iso.sha256
            artifacts/CigerTool-by-hkannq.iso.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cigertool-build-logs
          path: artifacts/logs
          if-no-files-found: warn
          retention-days: 30

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/CigerTool-by-hkannq.iso
