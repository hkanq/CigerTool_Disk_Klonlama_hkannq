name: Build CigerTool LiveOS Foundation

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-liveos-foundation:
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        shell: powershell
        run: |
          python -m unittest discover -s tests -p "test_*.py"

      - name: Build desktop application
        shell: powershell
        run: |
          .\build\scripts\build_app.ps1

      - name: Assemble LiveOS foundation
        shell: powershell
        run: |
          .\build\scripts\build_liveos_foundation.ps1

      - name: Validate LiveOS foundation artifact
        shell: powershell
        run: |
          $requiredPaths = @(
            "build-output\liveos\layout\liveos\shell\Start-CigerToolLiveShell.ps1",
            "build-output\liveos\layout\liveos\startup\Start-CigerToolLiveSession.ps1",
            "build-output\liveos\layout\liveos\startup\Start-CigerToolApp.ps1",
            "build-output\liveos\layout\liveos\startup\CigerToolLive.Runtime.ps1",
            "build-output\liveos\layout\app\CigerTool",
            "build-output\liveos\layout\isos\windows",
            "build-output\liveos\layout\isos\linux",
            "build-output\liveos\layout\isos\tools",
            "build-output\liveos\layout\iso-library",
            "build-output\liveos\manifests\liveos-foundation.json"
          )
          foreach ($path in $requiredPaths) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "LiveOS foundation dogrulama hatasi. Eksik yol: $path"
            }
          }
          Get-Item "build-output\liveos\manifests\liveos-foundation.json" | Format-List Name,Length,LastWriteTime

      - name: Upload LiveOS foundation artifact
        uses: actions/upload-artifact@v4
        with:
          name: cigertool-liveos-foundation
          path: build-output/liveos
          if-no-files-found: error
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cigertool-build-logs
          path: artifacts/logs
          if-no-files-found: warn
          retention-days: 30
